<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#080b11">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Star Realms Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============ TOKENS ============ */
:root{
  --bg:#080b11; --bg-2:#0b1018;
  --panel:#0e1420; --panel-2:#131b2a; --panel-3:#18222f;
  --line:#1f2c40; --line-soft:#16202f;
  --txt:#e8eef6; --txt-dim:#8294ad; --txt-faint:#56657d;
  --auth:#5db2ff;
  --combat:#ff5b4a; --combat-glow:rgba(255,91,74,.40);
  --trade:#ffc24b;  --trade-glow:rgba(255,194,75,.40);
  --good:#43d39a; --pend:#7c8cff;
  --tap:48px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  margin:0;font-family:'Chakra Petch','Segoe UI',system-ui,-apple-system,sans-serif;color:var(--txt);
  background:radial-gradient(1200px 800px at 50% -10%, #11192a 0%, transparent 60%),
             radial-gradient(900px 600px at 100% 110%, #0d1422 0%, transparent 55%), var(--bg);
  -webkit-font-smoothing:antialiased;overscroll-behavior:none;user-select:none;
}
button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none;}
button:focus-visible{outline:2px solid var(--trade);outline-offset:2px;}

.app{max-width:560px;margin:0 auto;min-height:100%;padding:max(10px,env(safe-area-inset-top)) 12px calc(14px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:11px;}

/* ============ HEADER ============ */
.head{display:flex;align-items:center;justify-content:space-between;padding:2px 2px 0;gap:8px;}
.brand{display:flex;flex-direction:column;line-height:1;min-width:0;}
.brand b{font-weight:700;font-size:18px;letter-spacing:.12em;white-space:nowrap;}
.brand span{font-size:9px;letter-spacing:.34em;color:var(--txt-faint);margin-top:5px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.head__btns{display:flex;gap:7px;flex:none;}
.icon-btn{width:44px;height:38px;border-radius:6px;border:1px solid var(--line);background:var(--panel);display:flex;align-items:center;justify-content:center;color:var(--txt-dim);transition:transform .08s,border-color .15s,color .15s,box-shadow .15s;}
.icon-btn:active{transform:scale(.94);}
.icon-btn svg{width:19px;height:19px;}
.icon-btn.on{border-color:var(--auth);color:var(--auth);background:color-mix(in srgb,var(--auth) 12%,var(--panel));box-shadow:0 0 14px -4px var(--auth);}

/* ============ MODE BADGE ============ */
.badge{display:flex;align-items:center;justify-content:center;gap:9px;padding:8px 12px;border:1px solid var(--line-soft);border-radius:8px;background:var(--panel);font-size:11px;letter-spacing:.13em;color:var(--txt-dim);text-transform:uppercase;transition:transform .08s;}
.badge:active{transform:scale(.985);}
.badge b{color:var(--txt);font-weight:600;letter-spacing:.07em;}
.badge .sep{color:var(--txt-faint);}
.badge .det{color:var(--auth);font-weight:600;}

/* ============ AUTHORITY HERO ============ */
.hero{position:relative;background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-radius:11px;overflow:hidden;}
.hero__gauge{position:relative;overflow:hidden;padding:16px 16px 12px;}
.hero__gauge::before{content:"";position:absolute;left:0;right:0;top:0;height:4px;background:var(--hc);box-shadow:0 0 16px var(--hc);z-index:2;transition:background .25s;}
.hero__fill{position:absolute;left:0;top:0;bottom:0;width:0;
  background:linear-gradient(90deg, color-mix(in srgb,var(--hc) 32%,transparent), color-mix(in srgb,var(--hc) 12%,transparent));
  border-right:2px solid var(--hc);box-shadow:0 0 22px -3px var(--hc);
  transition:width .35s cubic-bezier(.2,.8,.2,1), background .25s, border-color .25s;z-index:0;}
.hero__diff{position:absolute;top:0;bottom:0;left:0;width:0;z-index:1;display:none;
  border-left:2px solid var(--dc);border-right:2px solid var(--dc);box-shadow:0 0 16px -2px var(--dc);
  background:repeating-linear-gradient(135deg, color-mix(in srgb,var(--dc) 58%,transparent) 0 8px, color-mix(in srgb,var(--dc) 24%,transparent) 8px 16px);
  transition:left .25s cubic-bezier(.2,.8,.2,1), width .25s cubic-bezier(.2,.8,.2,1);}
.hero.is-pending .hero__diff{display:block;}
.hero.is-pending .hero__val{opacity:0;}
.hero.is-pending .hero__lbl{opacity:0;}
.hero__lbl{position:relative;z-index:1;font-size:11px;letter-spacing:.26em;color:color-mix(in srgb,var(--hc) 65%,var(--txt-dim));text-transform:uppercase;font-weight:600;text-align:center;transition:color .25s,opacity .2s;}
.hero__val{position:relative;z-index:1;display:block;width:100%;text-align:center;font-weight:700;font-size:84px;line-height:.95;color:var(--hc);font-variant-numeric:tabular-nums;text-shadow:0 0 34px color-mix(in srgb,var(--hc) 55%,transparent);padding:4px 0 2px;letter-spacing:.02em;transition:color .25s,opacity .2s;}
.hero__val:active{transform:scale(.985);}

/* staged-change controls — overlaid on the gauge so nothing below shifts */
.hero__pending{position:absolute;inset:0;z-index:4;display:none;align-items:center;justify-content:space-between;gap:10px;padding:0 12px;background:transparent;}
.hero.is-pending .hero__pending{display:flex;}
.hpend__btn{flex:none;width:48px;height:48px;border-radius:10px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;transition:transform .07s,filter .12s;}
.hpend__btn svg{width:22px;height:22px;}
.hpend__btn:active{transform:scale(.92);}
.hpend__cancel{background:color-mix(in srgb,var(--combat) 15%,var(--panel-3));border-color:color-mix(in srgb,var(--combat) 45%,var(--line));color:var(--combat);}
.hpend__apply{background:color-mix(in srgb,var(--good) 16%,var(--panel-3));border-color:color-mix(in srgb,var(--good) 50%,var(--line));color:var(--good);}
.hpend__center{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;}
.hpend__tag{font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--pend);font-weight:600;text-shadow:0 1px 4px rgba(8,11,17,.9);}
.hpend__diff{font-weight:700;font-size:clamp(24px,8vw,34px);line-height:1;letter-spacing:.02em;color:#fff;font-variant-numeric:tabular-nums;white-space:nowrap;text-shadow:0 1px 5px rgba(8,11,17,.95),0 0 3px rgba(8,11,17,.85);}
.hpend__track{position:relative;width:min(72%,200px);height:6px;border-radius:4px;background:var(--panel-3);overflow:hidden;}
.hpend__bar{position:absolute;left:0;top:0;bottom:0;width:0;border-radius:4px;background:var(--pend);box-shadow:0 0 10px var(--pend);}

.hero__btns{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;padding:11px 14px 14px;}
.hero__btns button{height:46px;border-radius:8px;background:var(--panel-3);border:1px solid var(--line);font-weight:600;font-size:16px;color:var(--txt);font-variant-numeric:tabular-nums;transition:transform .07s,background .12s;}
.hero__btns button:active{transform:scale(.93);background:#20303f;}

/* ============ RESOURCE READOUTS ============ */
.readout{position:relative;background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-radius:10px;padding:12px 14px 12px 18px;overflow:hidden;}
.readout::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--rc);box-shadow:0 0 16px var(--rc);}
.readout::after{content:"";position:absolute;inset:0;background:radial-gradient(120px 120px at 14% 50%, color-mix(in srgb,var(--rc) 14%,transparent), transparent 70%);pointer-events:none;}
.readout__lbl{position:relative;z-index:1;font-size:11px;letter-spacing:.28em;color:var(--txt-dim);text-transform:uppercase;font-weight:600;}
.readout__val{display:block;font-weight:700;font-size:58px;line-height:.95;color:var(--rc);font-variant-numeric:tabular-nums;text-shadow:0 0 26px var(--rcg);position:relative;z-index:1;padding:3px 0 7px;letter-spacing:.02em;}
.readout__val:active{transform:scale(.97);}
.readout__btns{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;position:relative;z-index:1;}
.readout__btns button{height:42px;border-radius:7px;background:var(--panel-3);border:1px solid var(--line);font-weight:600;font-size:15px;color:var(--txt);font-variant-numeric:tabular-nums;transition:transform .07s,background .12s,border-color .12s;}
.readout__btns button:active{transform:scale(.93);background:color-mix(in srgb,var(--rc) 22%,var(--panel-3));border-color:var(--rc);}
.readout__btns .sub{color:var(--txt-dim);background:var(--panel);}
.readout__btns .span3{grid-column:span 3;letter-spacing:.16em;font-size:12px;}

/* ============ FOOT ============ */
.foot{display:grid;grid-template-columns:1fr;gap:8px;margin-top:1px;}
.foot.has-undo{grid-template-columns:1fr auto;}
.endturn{min-height:54px;border-radius:10px;font-weight:700;letter-spacing:.16em;font-size:14px;text-transform:uppercase;color:#0b1018;background:linear-gradient(180deg,#f3f7fc,#c6d3e2);transition:transform .08s,filter .12s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;}
.endturn small{font-weight:500;letter-spacing:.08em;font-size:9px;text-transform:uppercase;color:#33485e;opacity:.65;}
.endturn:active{transform:scale(.985);filter:brightness(.93);}
.undo{min-height:54px;padding:0 16px;border-radius:10px;border:1px solid var(--line);background:var(--panel-2);color:var(--txt-dim);font-weight:600;letter-spacing:.1em;font-size:12px;display:flex;align-items:center;gap:7px;transition:transform .08s;}
.undo:active{transform:scale(.96);}
.undo svg{width:16px;height:16px;}
.spacer{flex:1;}

/* ============ MODALS ============ */
.scrim{position:fixed;inset:0;background:rgba(4,7,12,.72);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center;z-index:50;}
.scrim.show{display:flex;}
.scrim.center{align-items:center;padding:16px;}
.sheet{width:100%;max-width:560px;background:linear-gradient(180deg,var(--panel-2),var(--bg-2));border:1px solid var(--line);border-bottom:none;border-radius:16px 16px 0 0;padding:18px 16px calc(20px + env(safe-area-inset-bottom));max-height:92vh;overflow:auto;animation:rise .22s cubic-bezier(.2,.8,.2,1);}
.scrim.center .sheet{border-radius:14px;border-bottom:1px solid var(--line);max-width:340px;animation:pop .18s cubic-bezier(.2,.8,.2,1);}
@keyframes rise{from{transform:translateY(20px);opacity:.4;}to{transform:translateY(0);opacity:1;}}
@keyframes pop{from{transform:scale(.94);opacity:.4;}to{transform:scale(1);opacity:1;}}
.sheet h3{margin:2px 2px 16px;font-weight:700;letter-spacing:.14em;font-size:15px;text-transform:uppercase;}
.field{margin-bottom:16px;}
.field.hidden{display:none;}
.field>label{display:block;font-size:10.5px;letter-spacing:.2em;color:var(--txt-faint);text-transform:uppercase;margin-bottom:9px;}
.modes{display:flex;flex-direction:column;gap:7px;}
.mode{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 13px;border:1px solid var(--line);border-radius:9px;background:var(--panel);text-align:left;transition:border-color .12s,background .12s;}
.mode.sel{border-color:var(--auth);background:color-mix(in srgb,var(--auth) 10%,var(--panel));}
.mode__n{font-weight:600;font-size:14px;letter-spacing:.03em;color:var(--txt);}
.mode__p{font-size:11px;letter-spacing:.08em;color:var(--txt-faint);font-variant-numeric:tabular-nums;white-space:nowrap;}
.mode.sel .mode__p{color:var(--auth);}
.roles{display:flex;flex-wrap:wrap;gap:7px;}
.role{flex:1 1 auto;min-width:46%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;background:var(--panel);text-align:center;font-weight:600;font-size:13px;color:var(--txt-dim);transition:border-color .12s,background .12s,color .12s;}
.role.sel{border-color:var(--auth);background:color-mix(in srgb,var(--auth) 10%,var(--panel));color:var(--auth);}
.role small{display:block;font-weight:500;font-size:10px;letter-spacing:.06em;color:var(--txt-faint);margin-top:3px;}
.role.sel small{color:color-mix(in srgb,var(--auth) 75%,var(--txt));}
.stepper{display:flex;align-items:center;gap:12px;}
.stepper button{width:50px;height:50px;border-radius:9px;border:1px solid var(--line);background:var(--panel-3);font-size:24px;font-weight:600;color:var(--txt);transition:transform .07s,opacity .12s;}
.stepper button:active{transform:scale(.92);}
.stepper button[disabled]{opacity:.32;}
.stepper .v{font-size:26px;font-weight:700;min-width:46px;text-align:center;font-variant-numeric:tabular-nums;}
.sheet__foot{display:grid;grid-template-columns:1fr 1.4fr;gap:10px;margin-top:6px;}
.btn{min-height:52px;border-radius:9px;font-weight:700;letter-spacing:.14em;font-size:13px;text-transform:uppercase;transition:transform .08s,filter .12s;}
.btn:active{transform:scale(.98);}
.btn--primary{color:#0b1018;background:linear-gradient(180deg,#f3f7fc,#c6d3e2);}
.btn--primary:active{filter:brightness(.93);}
.btn--ghost{border:1px solid var(--line);background:var(--panel);color:var(--txt-dim);}
.hint{font-size:11px;color:var(--txt-faint);letter-spacing:.01em;margin:9px 2px 0;line-height:1.5;}

/* keypad */
.kp__val{text-align:center;font-weight:700;font-size:52px;font-variant-numeric:tabular-nums;color:var(--kc);text-shadow:0 0 26px color-mix(in srgb,var(--kc) 40%,transparent);padding:6px 0 14px;letter-spacing:.04em;min-height:64px;}
.kp__lbl{text-align:center;font-size:10.5px;letter-spacing:.24em;color:var(--txt-faint);text-transform:uppercase;margin-bottom:4px;}
.kp__grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.kp__grid button{height:54px;border-radius:9px;background:var(--panel-3);border:1px solid var(--line);font-size:22px;font-weight:600;color:var(--txt);font-variant-numeric:tabular-nums;transition:transform .07s,background .1s;}
.kp__grid button:active{transform:scale(.93);background:#20303f;}
.kp__grid .util{color:var(--txt-dim);background:var(--panel);font-size:18px;}
.kp__foot{display:grid;grid-template-columns:1fr 1.4fr;gap:10px;margin-top:12px;}

/* ============ SETUP GUIDE ============ */
.guide__sheet{display:flex;flex-direction:column;max-height:94vh;padding:0;}
.guide__head{flex:none;display:flex;align-items:center;justify-content:space-between;padding:15px 14px 13px 16px;border-bottom:1px solid var(--line-soft);}
.guide__head h3{margin:0;}
.guide__body{overflow:auto;padding:16px;-webkit-overflow-scrolling:touch;}
.chips{display:flex;flex-wrap:wrap;gap:7px;}
.chip{padding:10px 13px;border:1px solid var(--line);border-radius:8px;background:var(--panel);font-size:12.5px;letter-spacing:.01em;color:var(--txt-dim);font-weight:500;transition:border-color .12s,background .12s,color .12s;}
.chip.on{border-color:var(--auth);background:color-mix(in srgb,var(--auth) 12%,var(--panel));color:var(--auth);}
.guide__out{display:flex;flex-direction:column;gap:10px;margin-top:4px;}
.gstep{background:var(--panel);border:1px solid var(--line-soft);border-left:3px solid var(--auth);border-radius:10px;padding:12px 14px;}
.gstep h4{margin:0 0 9px;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--auth);font-weight:700;}
.gstep ul{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:7px;}
.gstep li{font-size:13px;line-height:1.5;color:var(--txt);letter-spacing:.01em;}
.gstep li.bullet{padding-left:14px;position:relative;}
.gstep li.bullet::before{content:"";position:absolute;left:2px;top:8px;width:5px;height:5px;border-radius:50%;background:var(--auth);}
.gstep li.muted{color:var(--txt-dim);font-size:12px;}
.guide__lead{font-size:12px;color:var(--txt-faint);line-height:1.5;margin:0 2px 16px;}

/* toast */
.toast{position:fixed;left:50%;bottom:calc(20px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(8px);background:var(--panel-3);border:1px solid var(--line);color:var(--txt);font-size:12.5px;letter-spacing:.01em;padding:11px 16px;border-radius:10px;box-shadow:0 12px 32px -12px rgba(0,0,0,.8);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:80;max-width:88vw;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="app">
  <header class="head">
    <div class="brand"><b>STAR REALMS</b><span>Authority · Combat · Trade</span></div>
    <div class="head__btns">
      <button class="icon-btn" id="wakeBtn" data-action="toggle-wake" aria-label="Keep screen awake">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
      </button>
      <button class="icon-btn" data-action="open-guide" aria-label="Setup guide">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m12 2 9 5-9 5-9-5 9-5Z"/><path d="m3 12 9 5 9-5"/><path d="m3 17 9 5 9-5"/></svg>
      </button>
      <button class="icon-btn" data-action="open-settings" aria-label="Game setup">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      </button>
    </div>
  </header>

  <button class="badge" id="badge" data-action="open-settings"></button>

  <div class="hero" id="hero">
    <div class="hero__gauge">
      <div class="hero__fill" id="heroFill"></div>
      <div class="hero__diff" id="heroDiff"></div>
      <div class="hero__lbl" id="heroLbl">Authority</div>
      <button class="hero__val" id="heroVal" data-action="auth-edit">50</button>
      <div class="hero__pending" id="heroPending">
        <button class="hpend__btn hpend__cancel" data-action="auth-cancel" aria-label="Discard change">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
        <div class="hpend__center">
          <span class="hpend__tag">Pending change</span>
          <span class="hpend__diff" id="hpendDiff">+0</span>
          <div class="hpend__track"><div class="hpend__bar" id="hpendBar"></div></div>
        </div>
        <button class="hpend__btn hpend__apply" data-action="auth-apply" aria-label="Apply now">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
        </button>
      </div>
    </div>
    <div class="hero__btns">
      <button data-action="auth-stage" data-amt="-5">−5</button>
      <button data-action="auth-stage" data-amt="-1">−1</button>
      <button data-action="auth-stage" data-amt="1">+1</button>
      <button data-action="auth-stage" data-amt="5">+5</button>
    </div>
  </div>

  <div id="combat"></div>
  <div id="trade"></div>
  <div class="foot" id="foot"></div>
  <div class="spacer"></div>
</div>

<!-- Settings -->
<div class="scrim" id="settingsScrim">
  <div class="sheet">
    <h3>Game Setup</h3>
    <div class="field"><label>Game mode</label><div class="modes" id="modeList"></div></div>
    <div class="field hidden" id="roleField"><label id="roleLabel">Role</label><div class="roles" id="roleList"></div></div>
    <div class="field hidden" id="raiderField">
      <label>Number of raiders</label>
      <div class="stepper"><button data-action="raider-dec">−</button><span class="v" id="raiderVal">2</span><button data-action="raider-inc">+</button></div>
    </div>
    <div class="field">
      <label>Starting authority</label>
      <div class="stepper"><button data-action="sauth-dec">−</button><span class="v" id="sauthVal">50</span><button data-action="sauth-inc">+</button></div>
      <p class="hint" id="modeNote"></p>
    </div>
    <div class="sheet__foot">
      <button class="btn btn--ghost" data-action="settings-cancel">Cancel</button>
      <button class="btn btn--primary" data-action="settings-start">Start New Game</button>
    </div>
  </div>
</div>

<!-- Setup guide -->
<div class="scrim" id="guideScrim">
  <div class="sheet guide__sheet">
    <div class="guide__head">
      <h3>Setup Guide</h3>
      <button class="icon-btn" data-action="guide-close" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="guide__body">
      <p class="guide__lead">Tick the sets you're using and pick the format. The steps below update live — how to build the trade deck and what to do before the first turn.</p>
      <div class="field">
        <label>Players</label>
        <div class="stepper"><button id="gPlayersDec" data-action="gplayers-dec">−</button><span class="v" id="gPlayersVal">2</span><button id="gPlayersInc" data-action="gplayers-inc">+</button></div>
        <p class="hint" id="gPlayersHint"></p>
      </div>
      <div class="field"><label>Format</label><div class="chips" id="gModes"></div></div>
      <div class="field"><label>Base set(s) you're using</label><div class="chips" id="gBases"></div></div>
      <div class="field"><label>Shuffle-in expansions</label><div class="chips" id="gShuffle"></div></div>
      <div class="field"><label>Pre-game packs</label><div class="chips" id="gPregame"></div></div>
      <div class="field"><label>Command Decks</label><div class="chips"><button class="chip" id="gCommand" data-action="g-command">Playing with Command Decks</button></div></div>
      <div class="guide__out" id="gOut"></div>
    </div>
  </div>
</div>

<!-- Keypad -->
<div class="scrim center" id="keypadScrim">
  <div class="sheet">
    <div class="kp__lbl" id="kpLabel">Set value</div>
    <div class="kp__val" id="kpVal">0</div>
    <div class="kp__grid">
      <button data-kp="7">7</button><button data-kp="8">8</button><button data-kp="9">9</button>
      <button data-kp="4">4</button><button data-kp="5">5</button><button data-kp="6">6</button>
      <button data-kp="1">1</button><button data-kp="2">2</button><button data-kp="3">3</button>
      <button class="util" data-kp="clr">CLR</button><button data-kp="0">0</button><button class="util" data-kp="del">⌫</button>
    </div>
    <div class="kp__foot">
      <button class="btn btn--ghost" data-action="kp-cancel">Cancel</button>
      <button class="btn btn--primary" data-action="kp-set">Set</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";

/* ============ game modes ============ */
const MODES = [
  { key:"standard", name:"Standard", pcounts:[2], auth:50,
    note:"1v1. First player draws a 3-card hand; second player draws 5." },
  { key:"ffa", name:"Free-for-All", pcounts:[3,4,5,6], auth:50,
    note:"3–6 players. Attack any player or base. Last fleet standing wins." },
  { key:"hunter", name:"Hunter", pcounts:[3,4,5,6], auth:50,
    note:"3–6 players. Attack only the player to your left (and neighbours' bases). Last standing wins." },
  { key:"hunterfb", name:"Hunter: First Blood", pcounts:[3,4,5,6], auth:50,
    note:"3–6 players. Hunter targeting; the instant the first player is defeated, the player to their right wins." },
  { key:"emperor", name:"Emperor", pcounts:[6], seats:"3v3", auth:50,
    roles:[ {key:"admiral",name:"Admiral",auth:50}, {key:"emperor",name:"Emperor",auth:60} ],
    note:"6 players, two teams of three. Admirals start at 50, Emperors at 60. Admirals fight the Admiral across; Emperors may hit anyone. A team loses when its Emperor falls." },
  { key:"hydra", name:"Hydra (teams)", pcounts:[4,6], auth:75, shared:true,
    roles:[ {key:"two",name:"Two-Headed · 2v2",auth:75,shared:true}, {key:"three",name:"Three-Headed · 3v3",auth:100,shared:true} ],
    note:"4 or 6 players. Shared team authority — 75 for 2v2, 100 for 3v3. Run ONE tracker for the team. Teammates may pass Trade/Combat." },
  { key:"raid", name:"Raid (Boss vs Raiders)", pcounts:[3,4,5,6], auth:50,
    roles:[ {key:"raider",name:"Raider",auth:50}, {key:"boss",name:"Boss",auth:"raid"} ],
    note:"3–6 players: one Boss vs 2–5 Raiders. Raiders start at 50. Boss authority scales with the raider count (50/70/70/90)." },
  { key:"solo", name:"Solo / Co-op (Challenge)", pcounts:[1,2,3,4], auth:50,
    note:"1–4 players vs a Boss challenge card. Track your own authority; the Boss's is on the challenge card. Multiplayer pools Trade/Combat like a Hydra." },
];
const RAID_BOSS = { 2:50, 3:70, 4:70, 5:90 };

const STATIC_FORMAT = {
  standard:["2 players.","Authority 50 each.","Going first: draw a 3-card hand. Second player: draw 5."],
  ffa:["3–6 players, turns go clockwise.","Authority 50 each.","First player draws 3, second draws 4, everyone else 5.","Attack any player or base. Last fleet standing wins."],
  hunter:["3–6 players, clockwise.","Authority 50 each.","First draws 3, second 4, rest 5.","You may only attack the player to your left, plus the bases of the players on your left and right."],
  hunterfb:["3–6 players, clockwise.","Authority 50 each.","First draws 3, second 4, rest 5.","Hunter targeting. The moment the first player is defeated, the player to their right wins."],
  emperor:["6 players in two teams of three.","Admirals start at 50, Emperors at 60.","Team A draws 3-card hands; Team B draws 5.","Admirals attack the opposing Admiral; once it falls they may hit the enemy Emperor. Emperors may attack anyone. A team loses when its Emperor is defeated.","Any player may pay 1 Trade to move a card from their discard to a neighbouring teammate's discard."],
};
function getFormat(mode, players){
  if (mode === "hydra"){
    const three = players >= 6;
    return [ three ? "6 players: two teams of three (3v3)." : "4 players: two teams of two (2v2).",
      three ? "Shared team authority: 100 per team." : "Shared team authority: 75 per team.",
      "First team draws 3-card hands; the other team draws 5.",
      "Teams alternate whole turns; teammates may pass any amount of Trade/Combat.",
      "Run ONE tracker per team." ];
  }
  if (mode === "raid"){
    const raiders = Math.max(2, players - 1);
    return [ `1 Boss vs ${raiders} Raiders, clockwise from the Boss.`, "Raiders start at 50.",
      `Boss starts at ${RAID_BOSS[raiders]} authority with a ${raiders <= 3 ? 7 : 8}-card hand (2 cards short on turn one).`,
      "Damage to the Boss's bases doesn't repair until the Boss's turn." ];
  }
  if (mode === "solo"){
    return [ `${players} player${players > 1 ? "s" : ""} vs a Boss challenge card.`,
      players > 1 ? "Players share a turn and pool Trade/Combat like a Hydra team." : "You start at 50 authority.",
      `Boss authority scales per player — Nemesis Beast ${50 * players} (50×${players}); Pirates of the Dark Star ${25 * players} (25×${players}).`,
      "Difficulty sets how many head-start turns the players get." ];
  }
  return STATIC_FORMAT[mode] || [];
}

/* ============ guide product data ============ */
const G = {
  bases:[ {k:"core",n:"Core Set",cap:2},{k:"colony",n:"Colony Wars",cap:2},{k:"frontiers",n:"Frontiers",cap:4} ],
  shuffle:[
    {k:"crisis_bb",n:"Crisis: Bases & Battleships"},{k:"crisis_ff",n:"Crisis: Fleets & Fortresses"},
    {k:"crisis_ev",n:"Crisis: Events"},{k:"crisis_he",n:"Crisis: Heroes"},
    {k:"united_as",n:"United: Assault"},{k:"united_co",n:"United: Command"},{k:"united_he",n:"United: Heroes"},
    {k:"ha_inv",n:"High Alert: Invasion"},{k:"ha_req",n:"High Alert: Requisition"},
    {k:"ha_tech",n:"High Alert: Tech"},{k:"ha_he",n:"High Alert: Heroes"},{k:"ha_fs",n:"High Alert: First Strike"},
    {k:"promo",n:"Promo cards"},
  ],
  pregame:[
    {k:"gambit",n:"Gambits",d:"deal a set number face-down to each player (usually 2); reveal during play"},
    {k:"cosmic",n:"Cosmic Gambit",d:"deal face-down like Gambits; also adds the Secret Outpost base"},
    {k:"missions",n:"United Missions",d:"deal 3 face-down to each player — alternate win condition (score 3 to win)"},
    {k:"scenarios",n:"Scenarios",d:"flip one Scenario card and apply its rules for the whole game"},
  ],
};

/* ============ state ============ */
let state = { authority:50, startAuth:50, combat:0, trade:0, badge:{name:"Standard",det:"start 50"}, lastChange:null };
let setupS = { mode:"standard", role:null, raiders:2, startAuth:50 };
let guideS = { players:2, mode:"standard", bases:new Set(), shuffle:new Set(), pregame:new Set(), command:false };
let kp = { target:null, buf:"" };
let pending = null;            // staged authority change: { delta, timer }

/* ============ helpers ============ */
const $ = id => document.getElementById(id);
const clampAuth = n => Math.max(0, Math.min(999, n));
const clampPool = n => Math.max(0, Math.min(999, n));
const curMode = () => MODES.find(m => m.key === setupS.mode);
function rangeLabel(arr){
  if (arr.length === 1) return String(arr[0]);
  const min = arr[0], max = arr[arr.length - 1];
  return (max - min + 1 === arr.length) ? `${min}–${max}` : arr.join(" or ");
}
const modePlayersLabel = m => rangeLabel(m.pcounts) + "P" + (m.seats ? " · " + m.seats : "");
function computeAuth(){
  const m = curMode();
  if (!m.roles) return m.auth;
  const r = m.roles.find(x => x.key === setupS.role) || m.roles[0];
  return r.auth === "raid" ? RAID_BOSS[setupS.raiders] : r.auth;
}
function healthColor(auth, start){
  if (auth <= 0) return "#ff5b4a";
  const r = start > 0 ? auth / start : 1;
  if (r > 1)    return "#5db2ff";
  if (r >= 0.6) return "#43d39a";
  if (r >= 0.3) return "#ffc24b";
  return "#ff5b4a";
}
function fillPct(auth, start){
  if (start <= 0) return auth > 0 ? 100 : 0;
  return Math.max(0, Math.min(100, (auth / start) * 100));
}

/* ============ start a game ============ */
function startGame(auth, badge){
  clearPending();
  state.authority = auth; state.startAuth = auth;
  state.combat = 0; state.trade = 0; state.badge = badge; state.lastChange = null;
  render();
}
function badgeFromSetup(){
  const m = curMode(); let name = m.name, shared = m.shared;
  if (m.roles){
    const r = m.roles.find(x => x.key === setupS.role) || m.roles[0];
    name = m.name.replace(/\s*\(.*\)/,"") + " · " + r.name.replace(/\s*·.*/,"");
    if (setupS.mode === "hydra") name = r.name;
    if (setupS.mode === "raid") name = "Raid — " + r.name;
    shared = r.shared;
  }
  let det = "start " + setupS.startAuth + (shared ? " · shared" : "");
  if (setupS.mode === "raid" && setupS.role === "boss") det = setupS.raiders + " raiders · start " + setupS.startAuth;
  return { name, det };
}

/* ============ staged authority entry ============ */
function stageAuth(amt){
  if (!pending) pending = { delta:0, timer:null };
  pending.delta += amt;
  if (pending.delta === 0){ cancelPending(); return; }
  render();
  restartCountdown();
}
function restartCountdown(){
  clearTimeout(pending.timer);
  const bar = $("hpendBar");
  bar.style.transition = "none";
  bar.style.width = "0%";
  void bar.offsetWidth;                      // force reflow so the next transition restarts
  bar.style.transition = "width 4000ms linear";
  bar.style.width = "100%";
  pending.timer = setTimeout(applyPending, 4000);
}
function applyPending(){
  if (!pending) return;
  clearTimeout(pending.timer);
  const prev = state.authority;
  const next = clampAuth(state.authority + pending.delta);
  pending = null;
  if (next !== prev){ state.authority = next; state.lastChange = { type:"auth", prev }; }
  render();
}
function cancelPending(){ if (pending){ clearTimeout(pending.timer); pending = null; } render(); }
function flushPending(){ if (pending) applyPending(); }
function clearPending(){ if (pending){ clearTimeout(pending.timer); pending = null; } }

/* ============ tracker rendering ============ */
function render(){ updateBadge(); updateHero(); renderPool("combat"); renderPool("trade"); renderFoot(); }
function updateBadge(){
  $("badge").innerHTML = `<b>${state.badge.name}</b><span class="sep">/</span><span class="det">${state.badge.det}</span>`;
}
function updateHero(){
  const dead = state.authority <= 0;
  const over = state.startAuth > 0 && state.authority > state.startAuth;
  $("hero").style.setProperty("--hc", healthColor(state.authority, state.startAuth));
  $("heroFill").style.width = fillPct(state.authority, state.startAuth) + "%";
  $("heroVal").textContent = state.authority;
  $("heroLbl").textContent = dead ? "Authority — defeated" : (over ? "Authority — above start" : "Authority");
  const isP = !!pending;
  $("hero").classList.toggle("is-pending", isP);
  if (isP){
    const proj = clampAuth(state.authority + pending.delta);
    $("hpendDiff").textContent = `${pending.delta > 0 ? "+" : ""}${pending.delta} → ${proj}`;
    const curP = fillPct(state.authority, state.startAuth);
    const projP = fillPct(proj, state.startAuth);
    const lo = Math.min(curP, projP), hi = Math.max(curP, projP);
    const d = $("heroDiff");
    d.style.setProperty("--dc", pending.delta < 0 ? "#ff5b4a" : "#43d39a");
    d.style.left = lo + "%";
    d.style.width = (hi - lo) + "%";
  }
}
function renderPool(pool){
  const isC = pool === "combat";
  $(pool).innerHTML = `
    <div class="readout" style="--rc:${isC?"var(--combat)":"var(--trade)"};--rcg:${isC?"var(--combat-glow)":"var(--trade-glow)"}">
      <span class="readout__lbl">${isC?"Combat Pool":"Trade Pool"}</span>
      <button class="readout__val" data-action="pool-edit" data-pool="${pool}">${state[pool]}</button>
      <div class="readout__btns">
        <button data-action="pool-delta" data-pool="${pool}" data-amt="1">+1</button>
        <button data-action="pool-delta" data-pool="${pool}" data-amt="2">+2</button>
        <button data-action="pool-delta" data-pool="${pool}" data-amt="3">+3</button>
        <button data-action="pool-delta" data-pool="${pool}" data-amt="5">+5</button>
        <button class="sub" data-action="pool-delta" data-pool="${pool}" data-amt="-1">−1</button>
        <button class="sub span3" data-action="pool-clear" data-pool="${pool}">Clear</button>
      </div>
    </div>`;
}
function renderFoot(){
  const showUndo = state.lastChange && !pending;
  $("foot").className = "foot" + (showUndo ? " has-undo" : "");
  $("foot").innerHTML = `
    ${showUndo ? `<button class="undo" data-action="undo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M3 13a9 9 0 1 0 3-7.7L3 8"/></svg>Undo</button>` : ""}
    <button class="endturn" data-action="end-turn">End Turn<small>clears combat &amp; trade</small></button>`;
}

/* ============ actions ============ */
document.addEventListener("click", e => {
  const t = e.target.closest("[data-action]");
  if (t) { handleAction(t.dataset.action, t); return; }
  const k = e.target.closest("[data-kp]");
  if (k) { handleKeypad(k.dataset.kp); }
});
function handleAction(action, el){
  const pool = el.dataset.pool;
  const amt = el.dataset.amt !== undefined ? +el.dataset.amt : 0;
  const k = el.dataset.k;
  switch(action){
    case "auth-stage":  stageAuth(amt); break;
    case "auth-apply":  applyPending(); break;
    case "auth-cancel": cancelPending(); break;
    case "auth-edit":   cancelPending(); openKeypad({type:"auth"}, state.authority, "Authority", "#5db2ff"); break;

    case "pool-delta": state[pool] = clampPool(state[pool] + amt); render(); break;
    case "pool-clear": state[pool] = 0; render(); break;
    case "pool-edit":  openKeypad({type:"pool",pool}, state[pool], pool==="combat"?"Combat pool":"Trade pool", pool==="combat"?"#ff5b4a":"#ffc24b"); break;

    case "end-turn":
      flushPending();
      state.lastChange = { type:"turn", combat:state.combat, trade:state.trade };
      state.combat = 0; state.trade = 0; render(); break;
    case "undo":
      if (state.lastChange){
        const lc = state.lastChange;
        if (lc.type === "auth") state.authority = lc.prev;
        else { state.combat = lc.combat; state.trade = lc.trade; }
        state.lastChange = null; render();
      }
      break;

    case "toggle-wake": toggleWake(); break;

    case "open-settings": flushPending(); openSettings(); break;
    case "settings-cancel": $("settingsScrim").classList.remove("show"); break;
    case "settings-start": startGame(setupS.startAuth, badgeFromSetup()); $("settingsScrim").classList.remove("show"); break;
    case "mode-sel": selectMode(el.dataset.mode); break;
    case "role-sel": setupS.role = el.dataset.role; setupS.startAuth = computeAuth(); refreshSettings(); break;
    case "raider-dec": setupS.raiders = Math.max(2, setupS.raiders-1); setupS.startAuth = computeAuth(); refreshSettings(); break;
    case "raider-inc": setupS.raiders = Math.min(5, setupS.raiders+1); setupS.startAuth = computeAuth(); refreshSettings(); break;
    case "sauth-dec": setupS.startAuth = Math.max(1, setupS.startAuth-5); refreshSettings(); break;
    case "sauth-inc": setupS.startAuth = Math.min(300, setupS.startAuth+5); refreshSettings(); break;

    case "open-guide": flushPending(); renderGuide(); $("guideScrim").classList.add("show"); break;
    case "guide-close": $("guideScrim").classList.remove("show"); break;
    case "gplayers-dec": guidePlayersStep(-1); break;
    case "gplayers-inc": guidePlayersStep(1); break;
    case "g-mode": guideS.mode = k; guideS.players = snapPlayers(k, guideS.players); renderGuide(); break;
    case "g-base": toggleSet(guideS.bases, k); renderGuide(); break;
    case "g-shuffle": toggleSet(guideS.shuffle, k); renderGuide(); break;
    case "g-pregame": toggleSet(guideS.pregame, k); renderGuide(); break;
    case "g-command": guideS.command = !guideS.command; renderGuide(); break;

    case "kp-cancel": $("keypadScrim").classList.remove("show"); break;
    case "kp-set": commitKeypad(); break;
  }
}
function toggleSet(set, k){ if (set.has(k)) set.delete(k); else set.add(k); }

/* ============ settings ============ */
function openSettings(){ refreshSettings(); $("settingsScrim").classList.add("show"); }
function selectMode(key){
  setupS.mode = key; const m = curMode();
  setupS.role = m.roles ? m.roles[0].key : null;
  setupS.startAuth = computeAuth(); refreshSettings();
}
function refreshSettings(){
  const m = curMode();
  $("modeList").innerHTML = MODES.map(mo =>
    `<button class="mode ${mo.key===setupS.mode?"sel":""}" data-action="mode-sel" data-mode="${mo.key}">
       <span class="mode__n">${mo.name}</span><span class="mode__p">${modePlayersLabel(mo)}</span></button>`).join("");
  const roleField = $("roleField");
  if (m.roles){
    roleField.classList.remove("hidden");
    $("roleLabel").textContent = setupS.mode === "hydra" ? "Team size" : "Role";
    $("roleList").innerHTML = m.roles.map(r => {
      const sub = r.auth === "raid" ? RAID_BOSS[setupS.raiders] + " auth" : r.auth + " auth" + (r.shared ? " · shared" : "");
      return `<button class="role ${r.key===setupS.role?"sel":""}" data-action="role-sel" data-role="${r.key}">${r.name}<small>${sub}</small></button>`;
    }).join("");
  } else roleField.classList.add("hidden");
  $("raiderField").classList.toggle("hidden", !(setupS.mode==="raid" && setupS.role==="boss"));
  $("raiderVal").textContent = setupS.raiders;
  $("sauthVal").textContent = setupS.startAuth;
  $("modeNote").textContent = m.note;
}

/* ============ setup guide ============ */
function guidePcounts(modeKey){ return (MODES.find(m => m.key === modeKey) || {pcounts:[1,2,3,4,5,6]}).pcounts; }
function snapPlayers(modeKey, cur){
  const pc = guidePcounts(modeKey);
  if (pc.includes(cur)) return cur;
  let best = pc[0], bestD = Infinity;
  pc.forEach(v => { const d = Math.abs(v - cur); if (d < bestD){ bestD = d; best = v; } });
  return best;
}
function guidePlayersStep(dir){
  const pc = guidePcounts(guideS.mode);
  let i = pc.indexOf(guideS.players); if (i === -1) i = 0;
  i = Math.max(0, Math.min(pc.length - 1, i + dir));
  guideS.players = pc[i]; renderGuide();
}
function renderGuide(){
  const m = MODES.find(x => x.key === guideS.mode);
  const pc = guidePcounts(guideS.mode);
  const idx = pc.indexOf(guideS.players);
  $("gPlayersVal").textContent = guideS.players;
  $("gPlayersDec").disabled = idx <= 0;
  $("gPlayersInc").disabled = idx >= pc.length - 1;
  $("gPlayersHint").textContent = m ? `${m.name} supports ${rangeLabel(m.pcounts)} player${m.pcounts.length===1 && m.pcounts[0]===1 ? "" : "s"}.` : "";
  $("gModes").innerHTML = MODES.map(mo => `<button class="chip ${mo.key===guideS.mode?"on":""}" data-action="g-mode" data-k="${mo.key}">${mo.name}</button>`).join("");
  $("gBases").innerHTML = G.bases.map(b => `<button class="chip ${guideS.bases.has(b.k)?"on":""}" data-action="g-base" data-k="${b.k}">${b.n} · ${b.cap}P</button>`).join("");
  $("gShuffle").innerHTML = G.shuffle.map(x => `<button class="chip ${guideS.shuffle.has(x.k)?"on":""}" data-action="g-shuffle" data-k="${x.k}">${x.n}</button>`).join("");
  $("gPregame").innerHTML = G.pregame.map(x => `<button class="chip ${guideS.pregame.has(x.k)?"on":""}" data-action="g-pregame" data-k="${x.k}">${x.n}</button>`).join("");
  $("gCommand").className = "chip" + (guideS.command ? " on" : "");
  $("gOut").innerHTML = generateSetup().map(st =>
    `<div class="gstep"><h4>${st.title}</h4><ul>${st.lines.map(li =>
      `<li class="${li.muted?"muted ":""}${li.bullet?"bullet":""}">${li.t}</li>`).join("")}</ul></div>`).join("");
}
function listAnd(arr){
  if (arr.length <= 1) return arr[0] || "";
  if (arr.length === 2) return arr[0] + " and " + arr[1];
  return arr.slice(0,-1).join(", ") + ", and " + arr[arr.length-1];
}
function generateSetup(){
  const s = guideS, steps = [];
  const sel = G.bases.filter(b => s.bases.has(b.k));
  const names = sel.map(b => b.n);
  const cap = sel.reduce((a,b) => a + b.cap, 0);
  const l1 = [];
  if (sel.length === 0){
    l1.push({t:"Pick at least one base set above to build the trade deck.", muted:true});
  } else {
    if (sel.length === 1 && cap >= s.players){
      l1.push({t:`Trade Deck: use the 80-card Trade Deck from ${names[0]} and set out its Explorer pile.`});
    } else {
      l1.push({t:"Trade Deck: shuffle the 80-card Trade Deck from every set you're using together, and pool all the Explorer ships."});
    }
    if (cap >= s.players){
      l1.push({t:`Deal one starting deck (8 Scouts + 2 Vipers) to each of the ${s.players} player${s.players>1?"s":""} — your set${sel.length>1?"s":""} cover up to ${cap}.`});
    } else {
      const copies = Math.ceil((s.players - cap) / 2);
      l1.push({t:`${listAnd(names)} cover only ${cap} player${cap>1?"s":""}. For ${s.players} you need more starting decks:`});
      l1.push({t:`Add ${copies} more base set${copies>1?"s":""} — each Core Set or Colony Wars adds 2 players, a Frontiers up to 4 — then deal one starting deck per player.`, bullet:true});
      l1.push({t:"Shuffle every Trade Deck (including the copies you add) together and pool all the Explorers.", bullet:true});
    }
    l1.push({t:"Rule of thumb: Core Set or Colony Wars supports 2 players per copy — 3–4 players needs two copies, 5–6 needs three. One Frontiers covers up to 4; add another set for 5–6.", muted:true});
    if (s.bases.has("frontiers") && s.mode === "solo") l1.push({t:"Frontiers' 8 oversized solo/co-op challenge cards provide the Boss for this mode.", muted:true});
  }
  steps.push({title:"1 · Build the trade deck", lines:l1});

  const sh = G.shuffle.filter(x => s.shuffle.has(x.k));
  if (sh.length){
    const l2 = [{t:"Shuffle these into the trade deck before laying out the Trade Row:"}];
    sh.forEach(x => l2.push({t:x.n, bullet:true}));
    if (s.shuffle.has("crisis_ev")) l2.push({t:"Events fire as soon as they reach the Trade Row, then get replaced.", muted:true});
    if (["crisis_he","united_he","ha_he"].some(kk => s.shuffle.has(kk))) l2.push({t:"Heroes go straight into play when acquired (not your discard pile).", muted:true});
    if (s.shuffle.has("ha_tech")) l2.push({t:"Tech comes into play when acquired and grants an activated ability you trigger with Trade.", muted:true});
    steps.push({title:"2 · Shuffle in expansions", lines:l2});
  }

  const pg = G.pregame.filter(x => s.pregame.has(x.k));
  if (pg.length) steps.push({title:"3 · Before the first turn", lines: pg.map(x => ({t:`${x.n} — ${x.d}`}))});

  if (s.command) steps.push({title:"4 · Command Decks", lines:[
    {t:"Each player takes one Command Deck instead of the standard start:"},
    {t:"Use its 12-card deck as your personal deck (skip the 8 Scouts + 2 Vipers).", bullet:true},
    {t:"Set your hand size and starting authority from your Commander card — this overrides the format's default authority.", bullet:true},
    {t:"Add each deck's Mega-Ship to the trade deck.", bullet:true},
    {t:"Deal each player their 2 Commander Gambits.", bullet:true},
    {t:"Or: one player is a raid Boss while the rest use standard decks.", muted:true},
  ]});

  const mname = (MODES.find(m => m.key === s.mode) || {}).name || "";
  steps.push({title:`5 · ${mname} — scores & turn order`, lines:getFormat(s.mode, s.players).map(t => ({t}))});
  return steps;
}

/* ============ keypad ============ */
function openKeypad(target, current, label, color){
  kp.target = target; kp.buf = String(current);
  $("kpLabel").textContent = label; $("kpVal").style.setProperty("--kc", color);
  drawKeypad(); $("keypadScrim").classList.add("show");
}
function drawKeypad(){ $("kpVal").textContent = kp.buf === "" ? "0" : kp.buf; }
function handleKeypad(key){
  if (key === "clr") kp.buf = "";
  else if (key === "del") kp.buf = kp.buf.slice(0,-1);
  else if (kp.buf.length < 3) kp.buf = (kp.buf === "0" ? "" : kp.buf) + key;
  drawKeypad();
}
function commitKeypad(){
  const v = kp.buf === "" ? 0 : parseInt(kp.buf,10);
  if (kp.target.type === "auth"){
    const prev = state.authority, next = clampAuth(v);
    if (next !== prev){ state.authority = next; state.lastChange = { type:"auth", prev }; }
  } else state[kp.target.pool] = clampPool(v);
  $("keypadScrim").classList.remove("show"); render();
}

/* ============ wake lock ============ */
let wakeLock = null, wakeOn = false;
async function requestWake(){
  try {
    wakeLock = await navigator.wakeLock.request("screen");
    wakeLock.addEventListener("release", () => { wakeLock = null; updateWakeBtn(); });
    wakeOn = true;
  } catch(e){ wakeOn = false; wakeLock = null; }
  updateWakeBtn();
}
async function releaseWake(){
  wakeOn = false;
  try { if (wakeLock) await wakeLock.release(); } catch(e){}
  wakeLock = null; updateWakeBtn();
}
async function toggleWake(){
  if (!("wakeLock" in navigator)){ showToast("Screen Wake Lock isn't supported in this browser."); return; }
  if (wakeOn){ await releaseWake(); showToast("Screen lock re-enabled."); }
  else {
    await requestWake();
    showToast(wakeOn ? "Screen will stay awake while this stays open." : "Couldn't enable Wake Lock here — try the hosted page.");
  }
}
function updateWakeBtn(){ $("wakeBtn").classList.toggle("on", wakeOn); }
document.addEventListener("visibilitychange", () => {
  if (wakeOn && document.visibilityState === "visible" && !wakeLock) requestWake();
});

/* ============ toast ============ */
let toastTimer = null;
function showToast(msg){
  const t = $("toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
}

/* close scrims on backdrop tap */
["settingsScrim","keypadScrim","guideScrim"].forEach(id =>
  $(id).addEventListener("click", e => { if (e.target.id === id) e.currentTarget.classList.remove("show"); }));

/* ============ boot ============ */
startGame(50, {name:"Standard", det:"start 50"});
updateWakeBtn();
</script>
